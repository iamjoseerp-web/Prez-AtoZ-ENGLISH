<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prez AtoZ ENGLISH – Pro Student Management</title>
<style>
  :root { --gold: #d4af37; --bg: #0b0b0b; --card-bg: #141414; --text: #f5f5f5; --danger: #cc0000; --wa: #25D366; --border: #2a2a2a; }
  body { margin:0; font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); padding-bottom: 60px; }
  
  /* 1. LOGO PLACEMENT REQUIREMENT[cite: 1] */
  header { padding: 15px 28px; border-bottom: 1px solid var(--border); background: #000; display: flex; align-items: center; gap: 20px; }
  header img.logo { height: 60px; width: auto; object-fit: contain; } /* Logo replaces text label[cite: 1] */
  header .title-group { display: flex; flex-direction: column; }
  header .sub { font-size: 11px; color: #888; text-transform: uppercase; margin-top: 4px; letter-spacing: 1px; }

  main { padding: 20px; max-width: 1300px; margin: auto; }
  
  button { padding: 10px 16px; background: var(--gold); color: #000; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
  button.secondary { background: #333; color: #fff; }
  button.danger { background: #550000; color: #fff; }
  button.wa { background: var(--wa); color: #fff; width: 100%; margin-top: 10px; }
  
  .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-top: 16px; }
  .student-list { margin-top: 15px; }
  .student-list button { margin-right: 8px; margin-bottom: 8px; border: 1px solid #333; transition: all 0.2s; }
  
  /* TRANSACTION LEDGER[cite: 1] */
  .ledger-container { margin-top: 25px; border-top: 1px solid var(--border); padding-top: 20px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
  th { text-align: left; color: var(--gold); padding: 10px; border-bottom: 2px solid var(--border); }
  td { padding: 10px; border-bottom: 1px solid var(--border); }
  .last-pay-highlight { background: rgba(212, 175, 55, 0.1); border: 1px solid var(--gold); padding: 5px 10px; border-radius: 4px; font-weight: bold; }

  /* WHATSAPP MESSAGE BOX (CHICKEN BUSINESS STYLE)[cite: 1] */
  .msg-preview { background: #000; border: 1px solid #444; border-left: 4px solid var(--wa); padding: 15px; border-radius: 6px; margin-top: 20px; }
  .msg-preview textarea { width: 100%; background: transparent; border: none; color: #25D366; font-family: monospace; font-size: 14px; resize: none; outline: none; margin-top: 10px; }

  /* CALENDAR LOGGING[cite: 1] */
  .calendar-header { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 25px 0 15px 0; }
  .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; font-size: 12px; color: #888; text-align: center; }
  .week { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-top: 10px; }
  .day { border: 1px solid var(--border); padding: 8px; min-height: 50px; font-size: 12px; background: #080808; }
  .day select { width: 100%; margin-top: 5px; background: #000; color: #fff; border: 1px solid #333; font-size: 10px; }

  /* MODALS */
  .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .sheet { background: #1a1a1a; padding: 25px; border-radius: 8px; width: 450px; border: 1px solid var(--gold); max-height: 90vh; overflow-y: auto; }
  .sheet input, .sheet select, .sheet textarea { width: 100%; padding: 10px; margin: 8px 0; background: #000; color: #fff; border: 1px solid #333; box-sizing: border-box; }
  .small { font-size: 11px; color: #888; display: block; margin-top: 10px; text-transform: uppercase; font-weight: bold; }

  /* FOOTER REQUIREMENT */
  footer { position: fixed; bottom: 0; width: 100%; padding: 10px 0; background: #000; border-top: 1px solid var(--border); text-align: center; font-size: 12px; color: #555; letter-spacing: 1px; }
</style>
</head>
<body>

<header>
  <!-- LOGO REPLACES TEXT LABEL[cite: 1] -->
  <img src="your-logo-file.png" alt="Prez AtoZ Logo" class="logo" onerror="this.style.display='none'">
  <div class="title-group">
    <h1 style="color:var(--gold); margin:0; font-size: 22px;">PREZ AtoZ ENGLISH</h1>
    <div class="sub">Student Management & Logistics</div>
  </div>
</header>

<main>
  <button onclick="openStudentModal()">+ ADD NEW STUDENT</button>
  <div class="student-list" id="studentList"></div>
  <div id="studentView"></div>
</main>

<footer>
  Prez AtoZ English version 1.0.0
</footer>

<script>
let students = JSON.parse(localStorage.getItem("students")||"[]");
let selectedStudentId = students[0]?.id || null;
let viewMonth = new Date().getMonth();
let viewYear  = new Date().getFullYear();

function save() {
  localStorage.setItem("students", JSON.stringify(students));
  render();
}

function getStudent(id) { return students.find(s => s.id === id); }
function balance(s) { return s.ledger.reduce((a, e) => a + (e.hours || 0), 0); }
function daysInMonth(y, m) { return new Date(y, m + 1, 0).getDate(); }
function firstWeekday(y, m) { return (new Date(y, m, 1).getDay() + 6) % 7; }
function fmtMonth(y, m) { 
  const names = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
  return `${names[m]} ${y}`;
}

// RESTORED PROFILE EDITING[cite: 1]
function openStudentModal(id = null) {
  const s = id ? getStudent(id) : null;
  const m = document.createElement("div");
  m.className = "modal";
  m.innerHTML = `
    <div class="sheet">
      <h3>${s ? 'Edit Student Profile' : 'New Student Enrollment'}</h3>
      <label class="small">Full Name</label>
      <div style="display:flex; gap:10px;">
        <input id="fn" placeholder="First Name" value="${s ? s.firstName : ''}">
        <input id="ln" placeholder="Last Name" value="${s ? s.lastName : ''}">
      </div>
      <label class="small">WhatsApp Phone</label>
      <input id="ph" placeholder="e.g. 521..." value="${s ? (s.phone || '') : ''}">
      <label class="small">CEFR Level</label>
      <select id="cefr">${['A1','A2','B1','B2','C1','C2'].map(l=>`<option value="${l}" ${s?.level===l?'selected':''}>${l}</option>`).join('')}</select>
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <div><label class="small">Hours Per Class</label><input id="hpc" type="number" step="0.5" value="${s ? s.hoursPerClass : 1}"></div>
        <div><label class="small">Classes/Week</label><input id="cpw" type="number" value="${s ? s.classesPerWeek : 3}"></div>
      </div>
      <label class="small">Subscription Price ($ Ref Only)</label>
      <input id="subPrice" type="number" value="${s ? s.subscriptionAmount : 210}">
      <label class="small">Due Date</label>
      <input id="dd" type="date" value="${s ? s.dueDate : ''}">
      <div style="margin-top:20px; display:flex; gap:10px;">
        <button style="flex:1" onclick="saveStudent(${id})">SAVE PROFILE</button>
        <button style="flex:1" class="secondary" onclick="closeModal()">CANCEL</button>
      </div>
    </div>`;
  document.body.appendChild(m);
}

function saveStudent(id) {
  const data = {
    firstName: fn.value, lastName: ln.value, phone: ph.value, level: cefr.value,
    hoursPerClass: parseFloat(hpc.value), classesPerWeek: parseInt(cpw.value),
    subscriptionAmount: parseFloat(subPrice.value), dueDate: dd.value
  };
  if (id) { Object.assign(getStudent(id), data); } 
  else { const n = { id: Date.now(), ...data, ledger: [] }; students.push(n); selectedStudentId = n.id; }
  closeModal(); save();
}

// RESTORED PAYMENT LEDGER[cite: 1]
function openPaymentModal(id) {
  const s = getStudent(id);
  const m = document.createElement("div");
  m.className = "modal";
  m.innerHTML = `
    <div class="sheet">
      <h3>Record Payment: ${s.firstName}</h3>
      <label class="small">Hours to Credit</label>
      <input id="payHrs" type="number" step="0.5" value="${s.classesPerWeek * 4}">
      <label class="small">Amount Paid ($)</label>
      <input id="payAmt" type="number" value="${s.subscriptionAmount}">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
        <div><label class="small">Discount ($)</label><input id="payDisc" type="number" value="0"></div>
        <div><label class="small">Discount Type</label><select id="payDiscType"><option value="">None</option><option value="Birthday">Birthday</option><option value="Holiday">Holiday</option><option value="Early Bird">Early Bird</option><option value="Custom">Custom</option></select></div>
      </div>
      <label class="small">Notes</label>
      <textarea id="payNotes"></textarea>
      <div style="margin-top:20px; display:flex; gap:10px;">
        <button style="flex:1" onclick="submitPayment(${id})">POST PAYMENT</button>
        <button style="flex:1" class="secondary" onclick="closeModal()">CANCEL</button>
      </div>
    </div>`;
  document.body.appendChild(m);
}

function submitPayment(id) {
  const s = getStudent(id);
  s.ledger.push({
    id: Date.now(), date: new Date().toISOString().slice(0, 10), type: "payment",
    hours: parseFloat(document.getElementById('payHrs').value),
    amount: parseFloat(document.getElementById('payAmt').value),
    discount: parseFloat(document.getElementById('payDisc').value),
    discountType: document.getElementById('payDiscType').value,
    notes: document.getElementById('payNotes').value
  });
  closeModal(); save();
}

function deletePayment(studentId, paymentId) {
  if(confirm("Roll back this payment? Hours will be removed.")){
    const s = getStudent(studentId);
    s.ledger = s.ledger.filter(e => e.id !== paymentId);
    save();
  }
}

// RESTORED CALENDAR & LOGGING[cite: 1]
function setDay(s, date, type) {
  s.ledger = s.ledger.filter(e => e.date !== date || e.type === "payment");
  if (!type) return save();
  let hrs = (type === "attended" || type === "noshow") ? -s.hoursPerClass : (type === "double" ? -(s.hoursPerClass * 2) : 0);
  s.ledger.push({ id: Date.now(), date, type, hours: hrs });
  save();
}

function renderStudent(s) {
  const bal = balance(s);
  const payments = s.ledger.filter(e => e.type === 'payment').reverse();
  const lastPay = payments[0] ? payments[0].date : 'None';
  const cycleHours = s.classesPerWeek * 4;

  const messageText = `STUDENT UPDATE: ${s.firstName} ${s.lastName}\n` +
                      `---------------------------\n` +
                      `Level: ${s.level}\n` +
                      `Hours Remaining: ${bal.toFixed(1)}\n` +
                      `Approx. Lessons: ${Math.floor(bal/s.hoursPerClass)}\n` +
                      `Due Date: ${s.dueDate || 'N/A'}\n` +
                      `---------------------------\n` +
                      `Next Cycle: ${cycleHours} Hours ($${s.subscriptionAmount})`;

  let html = `
  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 style="color:var(--gold); margin:0;">${s.firstName.toUpperCase()} ${s.lastName.toUpperCase()}</h2>
        <button class="secondary" onclick="openStudentModal(${s.id})">EDIT PROFILE</button>
    </div>
    
    <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:15px; margin: 20px 0;">
        <div><div class="small">Balance</div><div style="font-size:18px; font-weight:bold;">${bal.toFixed(1)} hrs</div></div>
        <div><div class="small">Last Paid</div><div class="last-pay-highlight">${lastPay}</div></div>
        <div><div class="small">Price Ref</div><div>$${s.subscriptionAmount}</div></div>
        <div><div class="small">Due Date</div><div>${s.dueDate || 'N/A'}</div></div>
    </div>

    <!-- RESTORED WHATSAPP LOCK[cite: 1] -->
    <div class="msg-preview">
      <div class="small" style="color:#25D366; margin-bottom:5px;">WHATSAPP MESSAGE PREVIEW</div>
      <textarea id="waMsg${s.id}" rows="8">${messageText}</textarea>
      <button class="wa" onclick="sendWhatsApp(${s.id})">SEND VIA WHATSAPP</button>
    </div>

    <!-- RESTORED LEDGER[cite: 1] -->
    <div class="ledger-container">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <h4 style="margin:0; color:var(--gold);">TRANSACTION HISTORY</h4>
        <button onclick="openPaymentModal(${s.id})">+ RECORD PAYMENT</button>
      </div>
      <div style="max-height: 180px; overflow-y: auto; border: 1px solid #333; border-radius:4px;">
        <table>
          <thead><tr><th>Date</th><th>Hrs</th><th>Paid</th><th>Discount</th><th>Notes</th><th></th></tr></thead>
          <tbody>
            ${payments.map(p => `
              <tr>
                <td>${p.date}</td><td>+${p.hours}</td><td>$${p.amount}</td>
                <td>${p.discount > 0 ? `$${p.discount} (${p.discountType})` : '—'}</td>
                <td title="${p.notes}">${p.notes ? p.notes.substring(0,12)+'...' : '—'}</td>
                <td><button class="danger" style="padding:2px 8px; font-size:10px;" onclick="deletePayment(${s.id}, ${p.id})">DEL</button></td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <!-- RESTORED CALENDAR[cite: 1] -->
    <div class="calendar-header">
      <button class="secondary" onclick="viewMonth--;if(viewMonth<0){viewMonth=11;viewYear--};render()">◀</button>
      <strong>${fmtMonth(viewYear,viewMonth)}</strong>
      <button class="secondary" onclick="viewMonth++;if(viewMonth>11){viewMonth=0;viewYear++};render()">▶</button>
    </div>
    <div class="weekdays"><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div></div>
    <div class="week">`;

  const dInM = daysInMonth(viewYear, viewMonth);
  const startDay = (new Date(viewYear, viewMonth, 1).getDay() + 6) % 7;
  for (let i = 0; i < startDay; i++) html += `<div class="day" style="opacity:0"></div>`;
  for (let d = 1; d <= dInM; d++) {
    const dt = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const st = s.ledger.find(e => e.date === dt && e.type !== "payment")?.type || "";
    html += `<div class="day">${d}<select onchange="setDay(getStudent(${s.id}),'${dt}',this.value)">
      <option value="">—</option>
      ${['attended','double','noshow','vacation','noclass'].map(opt => `<option value="${opt}" ${st===opt?'selected':''}>${opt}</option>`).join('')}
    </select></div>`;
  }
  
  html += `</div>
    <div style="margin-top:30px; padding-top:15px; border-top:1px solid #333;">
       <button class="danger" onclick="if(confirm('Delete profile?')){students=students.filter(x=>x.id!==${s.id});selectedStudentId=students[0]?.id||null;save()}">DELETE STUDENT PROFILE</button>
    </div>
  </div>`;
  return html;
}

function sendWhatsApp(id) {
  const s = getStudent(id);
  const text = document.getElementById(`waMsg${s.id}`).value;
  window.open(`https://wa.me/${s.phone}?text=${encodeURIComponent(text)}`, '_blank');
}

function closeModal() { document.querySelector(".modal")?.remove(); }
function render() {
  studentList.innerHTML = students.map(s => `<button style="${selectedStudentId===s.id?'border:2px solid #fff; background:#222;':''}" onclick="selectedStudentId=${s.id};render()">${s.firstName}</button>`).join("");
  const active = getStudent(selectedStudentId);
  studentView.innerHTML = active ? renderStudent(active) : "";
}
render();
</script>
</body>
</html>
