<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prez AtoZ ENGLISH – Student Management</title>
<style>
  :root { --gold: #d4af37; --bg: #0b0b0b; --card-bg: #141414; --text: #f5f5f5; --danger: #cc0000; --wa: #25D366; --border: #2a2a2a; }
  
  body { margin:0; font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; }
  
  /* HEADER & LOGO FIXES */
  header { padding: 15px 28px; border-bottom: 1px solid var(--border); background: #000; display: flex; align-items: center; gap: 20px; }
  .logo-container { height: 60px; min-width: 60px; display: flex; align-items: center; justify-content: center; border: 1px dashed #333; }
  header img.logo { height: 60px; width: auto; display: block; }
  header .title-group h1 { color: var(--gold); margin: 0; font-size: 22px; }
  header .sub { font-size: 11px; color: #888; text-transform: uppercase; margin-top: 4px; letter-spacing: 1px; }

  main { padding: 20px; max-width: 1200px; margin: auto; }
  
  /* BUTTON VISIBILITY FIXES */
  button { padding: 10px 16px; background: var(--gold); color: #000; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
  .student-list { margin: 20px 0; display: flex; flex-wrap: wrap; gap: 10px; }
  
  /* Fixed: Text color is now explicitly white for the student buttons */
  .student-list button { background: #222; color: #ffffff !important; border: 1px solid #444; min-width: 100px; }
  .student-list button.active { border: 2px solid var(--gold); background: #333; color: var(--gold) !important; }
  
  .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 25px; margin-top: 20px; }

  /* LEDGER TABLE */
  .ledger-box { max-height: 200px; overflow-y: auto; background: #000; border: 1px solid #333; border-radius: 6px; margin: 15px 0; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; color: var(--gold); padding: 12px; border-bottom: 2px solid var(--border); position: sticky; top: 0; background: #000; }
  td { padding: 10px; border-bottom: 1px solid var(--border); color: #ccc; }

  /* CALENDAR */
  .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 10px; }
  .day-cell { border: 1px solid #222; padding: 5px; min-height: 45px; background: #080808; font-size: 11px; }
  .day-cell select { width: 100%; background: #000; color: var(--gold); border: 1px solid #333; font-size: 10px; margin-top: 5px; }

  /* WHATSAPP BOTTOM POSITION */
  .wa-container { margin-top: 40px; background: #050505; border: 1px solid #222; border-left: 4px solid var(--wa); padding: 15px; border-radius: 8px; }
  .wa-container textarea { width: 100%; background: transparent; border: none; color: var(--wa); font-family: monospace; font-size: 14px; resize: none; outline: none; padding: 10px 0; }
  button.wa-btn { background: var(--wa); color: white; width: 100%; padding: 12px; font-size: 16px; margin-top: 10px; }

  /* FOOTER VISIBILITY FIX */
  footer { position: fixed; bottom: 0; width: 100%; padding: 15px 0; background: #000; border-top: 1px solid #222; text-align: center; color: #ffffff !important; font-size: 12px; z-index: 10; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .modal-content { background: #1a1a1a; padding: 30px; border-radius: 8px; width: 400px; border: 1px solid var(--gold); }
  input, select { width: 100%; padding: 12px; margin: 10px 0; background: #000; color: #fff; border: 1px solid #333; border-radius: 4px; box-sizing: border-box; }
</style>
</head>
<body>

<header>
  <div class="logo-container">
    <!-- Verbatim reference to your image file -->
    <img src="image_c5d2b0.png" alt="Prez AtoZ LOGO" class="logo" onerror="this.style.display='none'; this.parentElement.innerHTML='LOGO'">
  </div>
  <div class="title-group">
    <h1>PREZ AtoZ ENGLISH</h1>
    <div class="sub">Student Management & Logistics</div>
  </div>
</header>

<main>
  <button onclick="openModal()">+ ADD NEW STUDENT</button>
  
  <!-- Student Selection -->
  <div class="student-list" id="studentList"></div>

  <!-- Student Data Area -->
  <div id="displayArea"></div>
</main>

<footer>
  Prez AtoZ English version 1.0.0
</footer>

<script>
// Data Store
let students = JSON.parse(localStorage.getItem('prez_data') || '[]');
let activeId = null;

// Core Functions
function save() {
  localStorage.setItem('prez_data', JSON.stringify(students));
  render();
}

function getActive() { return students.find(s => s.id === activeId); }

function calculateBalance(student) {
  return student.ledger.reduce((acc, entry) => acc + (entry.hrs || 0), 0);
}

// Render Logic
function render() {
  const list = document.getElementById('studentList');
  list.innerHTML = students.map(s => `
    <button class="${activeId === s.id ? 'active' : ''}" onclick="activeId=${s.id}; render()">
      ${s.name}
    </button>
  `).join('');

  const display = document.getElementById('displayArea');
  const s = getActive();

  if (!s) {
    display.innerHTML = '<p style="color:#555; text-align:center; margin-top:50px;">Select or add a student to begin.</p>';
    return;
  }

  const bal = calculateBalance(s);
  const payments = s.ledger.filter(l => l.type === 'payment').reverse();

  display.innerHTML = `
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 style="color:var(--gold); margin:0;">${s.name.toUpperCase()}</h2>
        <button style="background:#333; color:#fff;" onclick="editStudent(${s.id})">EDIT PROFILE</button>
      </div>

      <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:20px; margin:25px 0;">
        <div><small style="color:#888;">BALANCE</small><div style="font-size:20px; font-weight:bold;">${bal.toFixed(1)} hrs</div></div>
        <div><small style="color:#888;">LAST PAID</small><div>${payments[0] ? payments[0].date : 'No Data'}</div></div>
        <div><small style="color:#888;">PRICE REF</small><div>$${s.price}</div></div>
        <div><small style="color:#888;">DUE DATE</small><div>${s.due || '---'}</div></div>
      </div>

      <h4 style="color:var(--gold); border-bottom:1px solid #333; padding-bottom:5px;">PAYMENT LEDGER</h4>
      <div class="ledger-box">
        <table>
          <thead><tr><th>Date</th><th>Hrs</th><th>Paid</th><th>Notes</th></tr></thead>
          <tbody>
            ${payments.map(p => `<tr><td>${p.date}</td><td>+${p.hrs}</td><td>$${p.amt}</td><td>${p.note}</td></tr>`).join('')}
          </tbody>
        </table>
      </div>
      <button onclick="addPayment(${s.id})">+ RECORD NEW PAYMENT</button>

      <h4 style="color:var(--gold); margin-top:30px;">ATTENDANCE TRACKER</h4>
      <div class="calendar-grid">
        ${Array.from({length:31}, (_,i)=> `<div class="day-cell">${i+1} <select><option>—</option><option>Attended</option><option>No Show</option></select></div>`).join('')}
      </div>

      <!-- WHATSAPP AT THE BOTTOM -->
      <div class="wa-container">
        <small>WHATSAPP MESSAGE PREVIEW</small>
        <textarea id="waMsg" rows="5">STUDENT UPDATE: ${s.name}\nBalance: ${bal.toFixed(1)} hrs\nNext Due: ${s.due}</textarea>
        <button class="wa-btn" onclick="alert('WhatsApp Link Generated')">SEND VIA WHATSAPP</button>
      </div>
      
      <button class="danger" style="margin-top:20px; width:100%;" onclick="deleteStudent(${s.id})">DELETE PERMANENTLY</button>
    </div>
  `;
}

// Modal Logic
function openModal() {
  const div = document.createElement('div');
  div.className = 'modal-overlay';
  div.innerHTML = `
    <div class="modal-content">
      <h3>Add New Student</h3>
      <input id="newName" placeholder="Full Name">
      <input id="newPrice" type="number" placeholder="Price (e.g. 210)">
      <input id="newDue" type="date">
      <button style="width:100%;" onclick="saveNew()">SAVE STUDENT</button>
      <button style="width:100%; background:#333; color:#fff; margin-top:10px;" onclick="this.closest('.modal-overlay').remove()">CANCEL</button>
    </div>
  `;
  document.body.appendChild(div);
}

function saveNew() {
  const n = {
    id: Date.now(),
    name: document.getElementById('newName').value,
    price: document.getElementById('newPrice').value,
    due: document.getElementById('newDue').value,
    ledger: []
  };
  students.push(n);
  activeId = n.id;
  document.querySelector('.modal-overlay').remove();
  save();
}

function addPayment(id) {
  const s = students.find(x => x.id === id);
  const amt = prompt("Enter Amount Paid ($):", s.price);
  if(amt) {
    s.ledger.push({
      date: new Date().toISOString().split('T')[0],
      type: 'payment',
      hrs: 16,
      amt: amt,
      note: 'Monthly Cycle'
    });
    save();
  }
}

function deleteStudent(id) {
  if(confirm("Are you sure? This cannot be undone.")) {
    students = students.filter(s => s.id !== id);
    activeId = students[0]?.id || null;
    save();
  }
}

// Initial Run
render();
</script>
</body>
</html>
