<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prez AtoZ ENGLISH – Pro Logistics</title>
<style>
  :root { --gold: #d4af37; --bg: #0b0b0b; --card-bg: #141414; --text: #f5f5f5; --danger: #cc0000; --wa: #25D366; }
  body { margin:0; font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); padding-bottom: 40px; }
  header { padding: 18px 28px; border-bottom: 1px solid #2a2a2a; background: #000; }
  header h1 { margin:0; font-size: 22px; color: var(--gold); letter-spacing: 1px; }
  header .sub { font-size: 11px; color: #888; text-transform: uppercase; margin-top: 4px; }
  main { padding: 20px; max-width: 1300px; margin: auto; }
  button { padding: 10px 16px; background: var(--gold); color: #000; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
  button.secondary { background: #333; color: #fff; }
  button.danger { background: #550000; color: #fff; }
  button.wa { background: var(--wa); color: #fff; width: 100%; margin-top: 10px; }
  .card { background: var(--card-bg); border: 1px solid #2a2a2a; border-radius: 8px; padding: 20px; margin-top: 16px; }
  .balance.pos { color: #5aff8c; font-weight: bold; }
  .balance.neg { color: #ff5a5a; font-weight: bold; }
  .student-list { margin-top: 15px; }
  .student-list button { margin-right: 8px; margin-bottom: 8px; border: 1px solid #333; }
  .calendar-header { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 20px 0; }
  .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; font-size: 12px; color: #888; text-align: center; }
  .week { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-top: 10px; }
  .day { border: 1px solid #2a2a2a; padding: 8px; min-height: 50px; font-size: 12px; background: #080808; }
  .day select { width: 100%; margin-top: 5px; background: #000; color: #fff; border: 1px solid #333; font-size: 10px; }
  .msg-preview { background: #000; border: 1px solid #444; border-left: 4px solid var(--wa); padding: 15px; border-radius: 6px; margin-top: 20px; }
  .msg-preview textarea { width: 100%; background: transparent; border: none; color: #25D366; font-family: monospace; font-size: 14px; resize: none; outline: none; }
  .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .sheet { background: #1a1a1a; padding: 25px; border-radius: 8px; width: 400px; border: 1px solid var(--gold); max-height: 90vh; overflow-y: auto; }
  .sheet input, .sheet select { width: 100%; padding: 10px; margin: 8px 0; background: #000; color: #fff; border: 1px solid #333; box-sizing: border-box; }
  .small { font-size: 11px; color: #888; display: block; margin-top: 10px; text-transform: uppercase; font-weight: bold; }
</style>
</head>
<body>

<header>
  <h1>PREZ AtoZ ENGLISH</h1>
  <div class="sub">Logistics & Student Hours Tracking</div>
</header>

<main>
  <button onclick="openStudentModal()">+ ADD NEW STUDENT</button>
  <div class="student-list" id="studentList"></div>
  <div id="studentView"></div>
</main>

<script>
let students = JSON.parse(localStorage.getItem("students")||"[]");
let selectedStudentId = students[0]?.id || null;
let viewMonth = new Date().getMonth();
let viewYear  = new Date().getFullYear();

function save() {
  localStorage.setItem("students", JSON.stringify(students));
  render();
}

function getStudent(id) { return students.find(s => s.id === id); }
function balance(s) { return s.ledger.reduce((a, e) => a + (e.hours || 0), 0); }
function daysInMonth(y, m) { return new Date(y, m + 1, 0).getDate(); }
function firstWeekday(y, m) { return (new Date(y, m, 1).getDay() + 6) % 7; }
function fmtMonth(y, m) { 
  const names = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
  return `${names[m]} ${y}`;
}

// PROFILE EDITING (CORE RULE 2: NO FINANCIAL IMPACT)[cite: 1]
function openStudentModal(id = null) {
  const s = id ? getStudent(id) : null;
  const m = document.createElement("div");
  m.className = "modal";
  m.innerHTML = `
    <div class="sheet">
      <h3>${s ? 'Edit Student Profile' : 'Add New Student'}</h3>
      <label class="small">Full Name</label>
      <div style="display:flex; gap:10px;">
        <input id="fn" placeholder="First Name" value="${s ? s.firstName : ''}">
        <input id="ln" placeholder="Last Name" value="${s ? s.lastName : ''}">
      </div>
      <label class="small">WhatsApp Phone</label>
      <input id="ph" placeholder="521..." value="${s ? (s.phone || '') : ''}">
      <label class="small">Level</label>
      <select id="cefr">
        ${['A1','A2','B1','B2','C1','C2'].map(l => `<option value="${l}" ${s && s.level === l ? 'selected' : ''}>${l}</option>`).join('')}
      </select>
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <div><label class="small">Hrs Per Class</label><input id="hpc" type="number" step="0.5" value="${s ? s.hoursPerClass : 1}"></div>
        <div><label class="small">Classes/Week</label><input id="cpw" type="number" value="${s ? s.classesPerWeek : 3}"></div>
      </div>
      <label class="small">Subscription Price ($ reference only)</label>
      <input id="subPrice" type="number" value="${s ? s.subscriptionAmount : 210}">
      <label class="small">Due Date (billing cycle reference)</label>
      <input id="dd" type="date" value="${s ? (s.dueDate || '') : ''}">
      <div style="margin-top:20px; display:flex; gap:10px;">
        <button style="flex:1" onclick="saveStudent(${id})">SAVE PROFILE</button>
        <button style="flex:1" class="secondary" onclick="closeModal()">CANCEL</button>
      </div>
    </div>`;
  document.body.appendChild(m);
}

function closeModal() { document.querySelector(".modal")?.remove(); }

function saveStudent(id) {
  const data = {
    firstName: fn.value, lastName: ln.value, phone: ph.value, level: cefr.value,
    hoursPerClass: parseFloat(hpc.value), classesPerWeek: parseInt(cpw.value),
    subscriptionAmount: parseFloat(subPrice.value), dueDate: dd.value
  };
  if (id) { Object.assign(getStudent(id), data); } 
  else { const n = { id: Date.now(), ...data, ledger: [] }; students.push(n); selectedStudentId = n.id; }
  closeModal(); save();
}

// PAY IN ACTION (CORE RULE 3 & 4: THE ONLY WAY TO ADD HOURS)[cite: 1]
function addPayment(id) {
  const s = getStudent(id);
  const suggestedHrs = s.classesPerWeek * 4;
  const h = parseFloat(prompt(`Enter hours to add (Payment for ${s.firstName}):`, suggestedHrs));
  if (!isNaN(h) && h > 0) {
    s.ledger.push({ 
      id: Date.now(), 
      date: new Date().toISOString().slice(0, 10), 
      type: "payment", 
      hours: h,
      priceAtTime: s.subscriptionAmount 
    });
    save();
  }
}

function setDay(s, date, type) {
  s.ledger = s.ledger.filter(e => e.date !== date || e.type === "payment");
  if (!type) return save();
  let hrs = (type === "attended" || type === "noshow") ? -s.hoursPerClass : (type === "double" ? -(s.hoursPerClass * 2) : 0);
  s.ledger.push({ date, type, hours: hrs });
  save();
}

function renderStudent(s) {
  const bal = balance(s);
  const lessons = Math.floor(bal / s.hoursPerClass);
  const nextPurchaseHours = s.classesPerWeek * 4;

  const messageText = `STUDENT UPDATE: ${s.firstName} ${s.lastName}\n` +
                      `---------------------------\n` +
                      `Level: ${s.level}\n` +
                      `Hours Remaining: ${bal.toFixed(1)}\n` +
                      `Approx. Lessons: ${lessons}\n` +
                      `Due Date: ${s.dueDate || 'N/A'}\n` +
                      `---------------------------\n` +
                      `Next Cycle: ${nextPurchaseHours} Hours ($${s.subscriptionAmount})`;

  let html = `
  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 style="margin:0; color:var(--gold);">${s.firstName.toUpperCase()} ${s.lastName.toUpperCase()}</h2>
        <button class="secondary" onclick="openStudentModal(${s.id})">EDIT PROFILE</button>
    </div>
    <div style="display:flex; gap:30px; margin: 15px 0;">
        <div><div class="small">Balance</div><div class="balance ${bal<=0?'neg':'pos'}">${bal.toFixed(1)} hrs</div></div>
        <div><div class="small">Price Reference</div><div>$${s.subscriptionAmount}</div></div>
        <div><div class="small">Schedule</div><div>${s.classesPerWeek}x / week</div></div>
        <div><div class="small">Due Date</div><div>${s.dueDate || 'Not Set'}</div></div>
    </div>
    <div class="calendar-header">
      <button class="secondary" onclick="viewMonth--;if(viewMonth<0){viewMonth=11;viewYear--};render()">◀</button>
      <strong>${fmtMonth(viewYear,viewMonth)}</strong>
      <button class="secondary" onclick="viewMonth++;if(viewMonth>11){viewMonth=0;viewYear++};render()">▶</button>
    </div>
    <div class="weekdays"><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div></div>
    <div class="week">`;

  for (let i = 0; i < firstWeekday(viewYear, viewMonth); i++) html += `<div class="day" style="opacity:0"></div>`;
  for (let d = 1; d <= daysInMonth(viewYear, viewMonth); d++) {
    const dt = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const st = s.ledger.find(e => e.date === dt && e.type !== "payment")?.type || "";
    html += `<div class="day">${d}<select onchange="setDay(getStudent(${s.id}),'${dt}',this.value)">
      <option value="">—</option>
      ${['attended','double','noshow','vacation','noclass'].map(opt => `<option value="${opt}" ${st===opt?'selected':''}>${opt}</option>`).join('')}
    </select></div>`;
  }
  
  html += `</div>
    <div class="msg-preview">
      <div class="small" style="color:#25D366; margin-bottom:5px;">WHATSAPP PREVIEW (EDITABLE)</div>
      <textarea id="waMsg${s.id}" rows="8">${messageText}</textarea>
      <button class="wa" onclick="sendWhatsApp(${s.id})">SEND TO WHATSAPP</button>
    </div>
    <div style="margin-top:20px; display:flex; justify-content:space-between; border-top:1px solid #333; padding-top:20px;">
      <button onclick="addPayment(${s.id})">+ RECORD PAYMENT (ADD HOURS)</button>
      <button class="danger" onclick="if(confirm('Delete student? This removes all ledger history.')){students=students.filter(x=>x.id!==${s.id});selectedStudentId=students[0]?.id||null;save()}">DELETE STUDENT</button>
    </div>
  </div>`;
  return html;
}

function sendWhatsApp(id) {
  const s = getStudent(id);
  const text = document.getElementById(`waMsg${s.id}`).value;
  window.open(`https://wa.me/${s.phone}?text=${encodeURIComponent(text)}`, '_blank');
}

function render() {
  studentList.innerHTML = students.map(s => {
    const bal = balance(s);
    const active = selectedStudentId === s.id;
    return `<button style="${bal<=0?'background:var(--danger);color:#fff':''}; ${active?'border:2px solid #fff':''}" onclick="selectedStudentId=${s.id};render()">${s.firstName}</button>`;
  }).join("");
  const active = getStudent(selectedStudentId);
  studentView.innerHTML = active ? renderStudent(active) : "";
}

render();
</script>
</body>
</html>
