<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prez AtoZ ENGLISH – Pro Student Management</title>
<style>
  :root { --gold: #d4af37; --bg: #0b0b0b; --card-bg: #141414; --text: #f5f5f5; --danger: #ff4500; --warning: #ffcc00; --wa: #25D366; --border: #2a2a2a; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); padding-bottom: 120px; }
  
  header { padding: 20px; border-bottom: 1px solid var(--border); background: #000; text-align: center; }
  header h1 { color: var(--gold); margin: 0; font-size: 1.2rem; letter-spacing: 2px; }

  main { padding: 20px; max-width: 1300px; margin: auto; }
  
  .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  button { padding: 10px 16px; background: var(--gold); color: #000; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
  button.secondary { background: #333; color: #fff; }
  button.danger { background: var(--danger); color: #fff; }
  button.wa { background: var(--wa); color: #fff; width: 100%; margin-top: 10px; }
  
  .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-top: 16px; position: relative; }
  
  .student-list { margin-bottom: 15px; display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; }
  .student-list button { white-space: nowrap; border: 1px solid #444; background: #222; color: #ffffff; }
  .student-list button.active { border: 2px solid var(--gold); color: var(--gold); }
  
  /* Status Colors */
  .status-ok { color: #00ff00; }
  .status-warning { color: var(--warning); font-weight: bold; } /* Yellow for 1 week left */
  
  @keyframes pulse-red {
    0% { background: transparent; }
    50% { background: rgba(255, 69, 0, 0.3); }
    100% { background: transparent; }
  }
  .status-critical { color: var(--danger); font-weight: bold; animation: pulse-red 1s infinite; padding: 5px; border-radius: 4px; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
  th { text-align: left; color: var(--gold); padding: 10px; border-bottom: 2px solid var(--border); }
  td { padding: 10px; border-bottom: 1px solid var(--border); }

  .calendar-header { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 25px 0 15px 0; }
  .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; font-size: 10px; color: #bbb; text-align: center; }
  .week { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-top: 5px; }
  .day { border: 1px solid var(--border); padding: 5px; min-height: 60px; font-size: 11px; background: #080808; }
  
  .day select { width: 100%; margin-top: 5px; background: #000; border: 1px solid #333; font-size: 9px; color: #fff; }
  .day select.attended { border-left: 3px solid #00ff00; }
  .day select.noshow { border-left: 3px solid var(--danger); }
  .day select.free { border-left: 3px solid #3399ff; }

  .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .sheet { background: #1a1a1a; padding: 20px; border-radius: 8px; width: 100%; max-width: 400px; border: 1px solid var(--gold); }
  .sheet input, .sheet select { width: 100%; padding: 10px; margin: 8px 0; background: #000; color: #fff; border: 1px solid #444; }

  .backup-zone { margin-top: 30px; padding: 20px; border: 1px dashed #444; text-align: center; }
</style>
</head>
<body>

<header>
  <h1>PREZ AtoZ ENGLISH</h1>
</header>

<main>
  <div class="controls">
    <button onclick="openStudentModal()">+ ADD STUDENT</button>
    <button class="secondary" onclick="exportData()">💾 EXPORT BACKUP</button>
    <button class="secondary" onclick="importData()">📂 IMPORT BACKUP</button>
  </div>

  <div class="student-list" id="studentList"></div>
  <div id="studentView"></div>
</main>

<script>
let students = JSON.parse(localStorage.getItem("prez_students")||"[]");
let selectedStudentId = students[0]?.id || null;
let viewMonth = new Date().getMonth();
let viewYear = new Date().getFullYear();

function save() {
  localStorage.setItem("prez_students", JSON.stringify(students));
  render();
}

function getStudent(id) { return students.find(s => s.id == id); }

function balance(s) { 
  return s.ledger.reduce((a, e) => a + (e.hours || 0), 0); 
}

// Logic for Red/Yellow alerts
function getStatusClass(s) {
  const bal = balance(s);
  const weeklyHours = s.hoursPerClass * s.lessonsPerWeek;
  if (bal <= (weeklyHours * 0.5)) return 'status-critical'; // Less than half a week left
  if (bal <= weeklyHours) return 'status-warning'; // 1 week left
  return 'status-ok';
}

function openStudentModal(id = null) {
  const s = id ? getStudent(id) : null;
  const m = document.createElement("div");
  m.className = "modal";
  m.innerHTML = `
    <div class="sheet">
      <h3>${s ? 'Edit Student' : 'New Student'}</h3>
      <input id="fn" placeholder="Name" value="${s ? s.firstName : ''}">
      <input id="ph" placeholder="WhatsApp (e.g. 15551234567)" value="${s ? s.phone : ''}">
      <select id="cefr">
        ${['A1','A2','B1','B2','C1','C2'].map(l=>`<option value="${l}" ${s?.level===l?'selected':''}>Level: ${l}</option>`).join('')}
      </select>
      <label style="font-size:10px">HOURS PER CLASS</label>
      <input id="hpc" type="number" step="0.5" value="${s ? s.hoursPerClass : 1}">
      <label style="font-size:10px">LESSONS PER WEEK (2, 3, or 4)</label>
      <input id="lpw" type="number" value="${s ? s.lessonsPerWeek : 2}">
      <button style="width:100%" onclick="saveStudent(${id})">SAVE</button>
      <button style="width:100%; margin-top:5px;" class="secondary" onclick="closeModal()">CANCEL</button>
    </div>`;
  document.body.appendChild(m);
}

function saveStudent(id) {
  const data = {
    firstName: document.getElementById('fn').value,
    phone: document.getElementById('ph').value,
    level: document.getElementById('cefr').value,
    hoursPerClass: parseFloat(document.getElementById('hpc').value),
    lessonsPerWeek: parseFloat(document.getElementById('lpw').value),
    ledger: id ? getStudent(id).ledger : []
  };
  if (id) { Object.assign(getStudent(id), data); } 
  else { const n = { id: Date.now(), ...data }; students.push(n); selectedStudentId = n.id; }
  closeModal(); save();
}

function addPayment(sid) {
  const s = getStudent(sid);
  const cycleHours = s.hoursPerClass * s.lessonsPerWeek * 4;
  const amt = prompt("Enter hours to add:", cycleHours);
  if (amt) {
    s.ledger.push({ id: Date.now(), date: new Date().toISOString().split('T')[0], type: "payment", hours: parseFloat(amt) });
    save();
  }
}

function setDay(sid, date, type) {
  const s = getStudent(sid);
  s.ledger = s.ledger.filter(e => e.date !== date || e.type === "payment");
  if (!type) return save();
  
  let hrs = 0;
  if (type === "attended" || type === "noshow") hrs = -s.hoursPerClass;
  // Vacation or Personal Day = 0 hours (No charge)
  
  s.ledger.push({ id: Date.now(), date, type, hours: hrs });
  save();
}

function renderStudent(s) {
  const bal = balance(s);
  const statusCls = getStatusClass(s);
  const cycleHours = s.hoursPerClass * s.lessonsPerWeek * 4;
  
  const msg = `Hi ${s.firstName}! Just a reminder from Prez AtoZ English. You have ${bal} hours left. Your next 4-week subscription (${cycleHours} hours) is due soon. Thank you!`;

  let html = `
    <div class="card">
      <div style="display:flex; justify-content:space-between;">
        <h2>${s.firstName} <small style="font-size:12px; color:#888;">(${s.level})</small></h2>
        <button class="secondary" onclick="openStudentModal(${s.id})">⚙️</button>
      </div>

      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin:15px 0;">
        <div style="background:#000; padding:15px; border-radius:5px; text-align:center;">
          <div style="font-size:10px; color:var(--gold)">HOURS REMAINING</div>
          <div style="font-size:24px;" class="${statusCls}">${bal}</div>
        </div>
        <div style="background:#000; padding:15px; border-radius:5px; text-align:center;">
          <div style="font-size:10px; color:var(--gold)">WEEKLY LOAD</div>
          <div style="font-size:24px;">${s.lessonsPerWeek}nd</div>
        </div>
      </div>

      <button style="width:100%; margin-bottom:20px;" onclick="addPayment(${s.id})">+ RENEW SUBSCRIPTION (${cycleHours} hrs)</button>

      <div class="calendar-header">
        <button class="secondary" onclick="changeMonth(-1)">◀</button>
        <strong>${new Date(viewYear, viewMonth).toLocaleString('default', { month: 'long', year: 'numeric' })}</strong>
        <button class="secondary" onclick="changeMonth(1)">▶</button>
      </div>
      
      <div class="weekdays"><div>S</div><div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div></div>
      <div class="week">`;

  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  
  for(let i=0; i<firstDay; i++) html += `<div class="day" style="visibility:hidden"></div>`;
  
  for(let d=1; d<=daysInMonth; d++) {
    const dateStr = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const entry = s.ledger.find(e => e.date === dateStr && e.type !== "payment");
    const val = entry ? entry.type : "";
    
    html += `
      <div class="day">
        ${d}
        <select onchange="setDay(${s.id}, '${dateStr}', this.value)" class="${val}">
          <option value="">--</option>
          <option value="attended" ${val==='attended'?'selected':''}>✅ Done</option>
          <option value="noshow" ${val==='noshow'?'selected':''}>❌ NoShow</option>
          <option value="vacation" ${val==='vacation'?'selected':''}>✈️ Vac</option>
          <option value="personal" ${val==='personal'?'selected':''}>🏠 Teacher</option>
        </select>
      </div>`;
  }

  html += `</div>
      <div style="margin-top:20px;">
        <button class="wa" onclick="window.open('https://wa.me/${s.phone}?text=${encodeURIComponent(msg)}')">SEND WHATSAPP REMINDER</button>
      </div>
      <button class="danger" style="width:100%; margin-top:20px; opacity:0.5" onclick="deleteStudent(${s.id})">Delete Student</button>
    </div>`;
  return html;
}

function changeMonth(dir) {
  viewMonth += dir;
  if(viewMonth > 11) { viewMonth = 0; viewYear++; }
  if(viewMonth < 0) { viewMonth = 11; viewYear--; }
  render();
}

function closeModal() { document.querySelector(".modal")?.remove(); }

function deleteStudent(id) {
  if(confirm("Are you sure?")) {
    students = students.filter(s => s.id !== id);
    selectedStudentId = students[0]?.id || null;
    save();
  }
}

function exportData() {
  const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(students));
  const dlAnchorElem = document.createElement('a');
  dlAnchorElem.setAttribute("href", dataStr);
  dlAnchorElem.setAttribute("download", `prez_backup_${new Date().toISOString().split('T')[0]}.json`);
  dlAnchorElem.click();
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.onchange = e => {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.readAsText(file,'UTF-8');
    reader.onload = readerEvent => {
      students = JSON.parse(readerEvent.target.result);
      save();
    }
  }
  input.click();
}

function render() {
  const list = document.getElementById("studentList");
  list.innerHTML = students.map(s => `
    <button class="${selectedStudentId == s.id ? 'active' : ''}" onclick="selectedStudentId=${s.id};render()">
      ${s.firstName} (${balance(s)})
    </button>
  `).join("");
  
  const active = getStudent(selectedStudentId);
  document.getElementById("studentView").innerHTML = active ? renderStudent(active) : `<p style="text-align:center; margin-top:50px; color:#666;">No students added yet.</p>`;
}

render();
</script>
</body>
</html>
