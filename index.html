<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prez AtoZ ENGLISH – Student Pro</title>

<style>
  :root { --gold: #d4af37; --bg: #0b0b0b; --card-bg: #141414; --text: #f5f5f5; --danger: #cc0000; --wa: #25D366; }
  body { margin:0; font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); }
  header { padding: 18px 28px; border-bottom: 1px solid #2a2a2a; background: #000; }
  header h1 { margin:0; font-size: 22px; color: var(--gold); letter-spacing: 1px; }
  header .sub { font-size: 11px; color: #888; text-transform: uppercase; margin-top: 4px; }

  main { padding: 20px; max-width: 1300px; margin: auto; }
  button { padding: 10px 16px; background: var(--gold); color: #000; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
  button.secondary { background: #333; color: #fff; }
  button.danger { background: #550000; color: #fff; }
  button.wa { background: var(--wa); color: #fff; }

  .card { background: var(--card-bg); border: 1px solid #2a2a2a; border-radius: 8px; padding: 20px; margin-top: 16px; }
  .balance.pos { color: #5aff8c; font-weight: bold; }
  .balance.neg { color: #ff5a5a; font-weight: bold; }

  .student-list { margin-top: 15px; }
  .student-list button { margin-right: 8px; margin-bottom: 8px; border: 1px solid #333; }
  
  .calendar-header { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 20px 0; }
  .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; font-size: 12px; color: #888; text-align: center; }
  .week { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-top: 10px; }

  .day { border: 1px solid #2a2a2a; padding: 8px; min-height: 50px; font-size: 12px; background: #080808; }
  .day select { width: 100%; margin-top: 5px; background: #000; color: #fff; border: 1px solid #333; font-size: 10px; }

  .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .sheet { background: #1a1a1a; padding: 25px; border-radius: 8px; width: 380px; border: 1px solid var(--gold); }
  .sheet input, .sheet select { width: 100%; padding: 10px; margin: 8px 0; background: #000; color: #fff; border: 1px solid #333; box-sizing: border-box; }
  .small { font-size: 11px; color: #888; display: block; margin-top: 10px; text-transform: uppercase; font-weight: bold; }
</style>
</head>

<body>

<header>
  <h1>PREZ AtoZ ENGLISH</h1>
  <div class="sub">Logistics & Student Management System</div>
</header>

<main>
  <button onclick="openStudentModal()">+ ADD NEW STUDENT</button>
  <div class="student-list" id="studentList"></div>
  <div id="studentView"></div>
</main>

<script>
// STORAGE & GLOBAL STATE[cite: 1]
let students = JSON.parse(localStorage.getItem("students")||"[]");
let selectedStudentId = students[0]?.id || null;
let viewMonth = new Date().getMonth();
let viewYear  = new Date().getFullYear();

function save() {
  localStorage.setItem("students", JSON.stringify(students));
  render();
}

function getStudent(id) { return students.find(s => s.id === id); }
function balance(s) { return s.ledger.reduce((a, e) => a + (e.hours || 0), 0); }
function daysInMonth(y, m) { return new Date(y, m + 1, 0).getDate(); }
function firstWeekday(y, m) { return (new Date(y, m, 1).getDay() + 6) % 7; }
function fmtMonth(y, m) { 
  const names = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
  return `${names[m]} ${y}`;
}

// 2. STUDENT RECORD EDITABILITY[cite: 1]
function openStudentModal(id = null) {
  const s = id ? getStudent(id) : null;
  const m = document.createElement("div");
  m.className = "modal";
  m.innerHTML = `
    <div class="sheet">
      <h3>${s ? 'Edit Student' : 'Add New Student'}</h3>
      <input id="fn" placeholder="First Name" value="${s ? s.firstName : ''}">
      <input id="ln" placeholder="Last Name" value="${s ? s.lastName : ''}">
      <input id="ph" placeholder="WhatsApp Phone (e.g. 521...)" value="${s ? (s.phone || '') : ''}">
      
      <label class="small">Level</label>
      <select id="cefr">
        ${['A1','A2','B1','B2','C1','C2'].map(l => `<option value="${l}" ${s && s.level === l ? 'selected' : ''}>${l}</option>`).join('')}
      </select>

      <label class="small">Hours per class</label>
      <select id="hpc">
        ${[1, 1.5, 2].map(h => `<option value="${h}" ${s && s.hoursPerClass === h ? 'selected' : ''}>${h}</option>`).join('')}
      </select>
      
      <label class="small">Due Date (Package Expiry)</label>
      <input id="dd" type="date" value="${s ? (s.dueDate || '') : ''}">
      
      <div style="margin-top:20px; display:flex; gap:10px;">
        <button style="flex:1" onclick="saveStudent(${id})">SAVE</button>
        <button style="flex:1" class="secondary" onclick="closeModal()">CANCEL</button>
      </div>
    </div>`;
  document.body.appendChild(m);
}

function closeModal() { document.querySelector(".modal")?.remove(); }

function saveStudent(id) {
  const data = {
    firstName: fn.value,
    lastName: ln.value,
    phone: ph.value,
    level: cefr.value,
    hoursPerClass: parseFloat(hpc.value),
    dueDate: dd.value
  };

  if (id) {
    Object.assign(getStudent(id), data);
  } else {
    const n = { id: Date.now(), ...data, ledger: [], classesPerWeek: 2, subscriptionAmount: 0 };
    students.push(n);
    selectedStudentId = n.id;
  }
  closeModal(); save();
}

// 3. WHATSAPP INTEGRATION[cite: 1]
function sendWhatsApp(id) {
  const s = getStudent(id);
  const bal = balance(s);
  const lessons = Math.floor(bal / s.hoursPerClass);
  const text = `Hi ${s.firstName}, this is a reminder from Prez AtoZ ENGLISH. You have ${bal.toFixed(1)} hours (${lessons} lessons) remaining. Your current package due date is ${s.dueDate || 'N/A'}. Please note that a payment will be due soon.`;
  
  const url = `https://wa.me/${s.phone}?text=${encodeURIComponent(text)}`;
  window.open(url, '_blank');
}

// CALENDAR & LOGGING LOGIC (LOCKED & PRESERVED)[cite: 1]
function setDay(s, date, type) {
  s.ledger = s.ledger.filter(e => e.date !== date || e.type === "payment");
  if (!type) return save();
  let hrs = (type === "attended" || type === "noshow") ? -s.hoursPerClass : (type === "double" ? -(s.hoursPerClass * 2) : 0);
  s.ledger.push({ date, type, hours: hrs });
  save();
}

function addPayment(s) {
  const h = parseFloat(prompt("Enter hours to credit:"));
  if (h > 0) { s.ledger.push({ id: Date.now(), date: new Date().toISOString().slice(0, 10), type: "payment", hours: h }); save(); }
}

function renderStudent(s) {
  const bal = balance(s);
  const lessons = Math.floor(bal / s.hoursPerClass);
  const isLow = bal <= 5; // 4. AUTOMATED REMINDER TRIGGER[cite: 1]

  let html = `
  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 style="margin:0; color:var(--gold);">${s.firstName.toUpperCase()} ${s.lastName.toUpperCase()}</h2>
        <button class="secondary" onclick="openStudentModal(${s.id})">EDIT PROFILE</button>
    </div>
    
    <div style="display:flex; gap:30px; margin: 15px 0;">
        <div><div class="small">Balance</div><div class="balance ${bal<=0?'neg':'pos'}">${bal.toFixed(1)} hrs</div></div>
        <div><div class="small">Lessons Left</div><div>${lessons}</div></div>
        <div><div class="small">Level</div><div>${s.level}</div></div>
        <div><div class="small">Due Date</div><div style="${isLow?'color:orange':''}">${s.dueDate || 'Not Set'}</div></div>
    </div>

    ${isLow ? `<div style="background:#332200; padding:10px; border-radius:5px; margin-bottom:15px; font-size:13px; color:var(--gold);">⚠️ Student has ${bal.toFixed(1)} hours remaining. Reminder recommended.</div>` : ''}

    <button class="wa" style="width:100%; margin-bottom:20px;" onclick="sendWhatsApp(${s.id})">SEND WHATSAPP REMINDER</button>

    <div class="calendar-header">
      <button class="secondary" onclick="viewMonth--;if(viewMonth<0){viewMonth=11;viewYear--};render()">◀</button>
      <strong>${fmtMonth(viewYear,viewMonth)}</strong>
      <button class="secondary" onclick="viewMonth++;if(viewMonth>11){viewMonth=0;viewYear++};render()">▶</button>
    </div>

    <div class="weekdays"><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div></div>
    <div class="week">
  `;

  for (let i = 0; i < firstWeekday(viewYear, viewMonth); i++) html += `<div class="day" style="opacity:0"></div>`;
  for (let d = 1; d <= daysInMonth(viewYear, viewMonth); d++) {
    const dt = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const st = s.ledger.find(e => e.date === dt && e.type !== "payment")?.type || "";
    html += `<div class="day">${d}<select onchange="setDay(getStudent(${s.id}),'${dt}',this.value)">
      <option value="">—</option>
      ${['attended','double','noshow','vacation','noclass'].map(opt => `<option value="${opt}" ${st===opt?'selected':''}>${opt}</option>`).join('')}
    </select></div>`;
  }
  
  html += `</div><div style="margin-top:20px; display:flex; justify-content:space-between;">
    <button onclick="addPayment(getStudent(${s.id}))">+ ADD PAYMENT</button>
    <button class="danger" onclick="if(confirm('Delete student?')){students=students.filter(x=>x.id!==${s.id});selectedStudentId=students[0]?.id||null;save()}">DELETE</button>
  </div></div>`;
  return html;
}

function render() {
  studentList.innerHTML = students.map(s => {
    const bal = balance(s);
    return `<button style="${bal<=0?'background:var(--danger);color:#fff':''}; ${selectedStudentId===s.id?'border:2px solid #fff':''}" onclick="selectedStudentId=${s.id};render()">${s.firstName}</button>`;
  }).join("");
  const active = getStudent(selectedStudentId);
  studentView.innerHTML = active ? renderStudent(active) : "";
}

render();
</script>
</body>
</html>
