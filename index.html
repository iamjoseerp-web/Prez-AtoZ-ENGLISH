<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prez AtoZ ENGLISH – Pro Student Management</title>
<style>
  :root { --gold: #d4af37; --bg: #0b0b0b; --card-bg: #141414; --text: #f5f5f5; --danger: #ff4500; --wa: #25D366; --border: #2a2a2a; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; }
  
  header { padding: 20px 28px; border-bottom: 1px solid var(--border); background: #000; display: flex; align-items: center; justify-content: center; }
  header img.logo { height: 140px; width: auto; object-fit: contain; display: block; } 

  main { padding: 20px; max-width: 1300px; margin: auto; }
  
  button { padding: 10px 16px; background: var(--gold); color: #000; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
  button.secondary { background: #333; color: #fff; }
  button.danger { background: var(--danger); color: #fff; }
  button.wa { background: var(--wa); color: #fff; width: 100%; margin-top: 10px; }
  
  .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-top: 16px; position: relative; }
  
  .student-list { margin-top: 15px; }
  .student-list button { margin-right: 8px; margin-bottom: 8px; border: 1px solid #444; background: #222; color: #ffffff; transition: all 0.2s; }
  .student-list button.active { border: 2px solid var(--gold); background: #333; color: var(--gold); }
  
  @keyframes pulse-red {
    0% { color: #fff; }
    50% { color: #ff4444; text-shadow: 0 0 10px #ff0000; }
    100% { color: #fff; }
  }
  .low-balance { animation: pulse-red 1.5s infinite; font-weight: bold; color: #ff4444; }

  .ledger-container { margin-top: 25px; border-top: 1px solid var(--border); padding-top: 20px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
  th { text-align: left; color: var(--gold); padding: 10px; border-bottom: 2px solid var(--border); }
  td { padding: 10px; border-bottom: 1px solid var(--border); }

  .calendar-header { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 25px 0 15px 0; }
  
  .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; font-size: 12px; color: #bbb; text-align: center; text-transform: uppercase; font-weight: 900; letter-spacing: 0.5px; }
  
  .week { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-top: 5px; }
  .day { border: 1px solid var(--border); padding: 8px; min-height: 50px; font-size: 12px; background: #080808; position: relative; }
  .day.empty { border: none; background: transparent; }
  
  .day select { width: 100%; margin-top: 5px; background: #000; border: 1px solid #333; font-size: 10px; font-weight: bold; }
  .day select.attended { color: #00ff00; }
  .day select.double { color: #3399ff; }
  .day select.noshow { color: #ff0000; }
  .day select.vacation { color: #ffffff; }
  .day select.none { color: #666; font-weight: normal; }

  .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .sheet { background: #1a1a1a; padding: 25px; border-radius: 8px; width: 450px; border: 1px solid var(--gold); max-height: 90vh; overflow-y: auto; }
  .sheet input, .sheet select, .sheet textarea { width: 100%; padding: 10px; margin: 8px 0; background: #000; color: #fff; border: 1px solid #333; }
  .small { font-size: 11px; color: #888; display: block; margin-top: 10px; text-transform: uppercase; font-weight: bold; }

  footer { position: fixed; bottom: 0; width: 100%; padding: 15px 0; background: #000; border-top: 1px solid var(--border); text-align: center; font-size: 14px; color: #ffffff; }
</style>
</head>
<body>

<header>
  <img src="logo_size_invert.jpg" alt="Prez AtoZ English Logo" class="logo">
</header>

<main>
  <button onclick="openStudentModal()">+ ADD NEW STUDENT</button>
  <div class="student-list" id="studentList"></div>
  <div id="studentView"></div>
</main>

<footer>Prez AtoZ English v1.1.9</footer>

<script>
let students = JSON.parse(localStorage.getItem("students")||"[]");
let selectedStudentId = students[0]?.id || null;
let viewMonth = new Date().getMonth();
let viewYear  = new Date().getFullYear();

function save() {
  localStorage.setItem("students", JSON.stringify(students));
  render();
}

function getStudent(id) { return students.find(s => s.id == id); }
function balance(s) { return s.ledger.reduce((a, e) => a + (e.hours || 0), 0); }

function calculateDynamicDueDate(s) {
    const bal = balance(s);
    if (bal <= 0) return "EXPIRED";
    
    const lessonsRemaining = Math.floor(bal / s.hoursPerClass);
    if (lessonsRemaining <= 0) return "URGENT";

    const lessonsPerWeek = s.lessonsPerWeek || 1;
    const daysToExhaust = Math.ceil((lessonsRemaining / lessonsPerWeek) * 7);
    
    let dueDate = new Date();
    dueDate.setDate(dueDate.getDate() + daysToExhaust);
    return dueDate.toISOString().split('T')[0];
}

function openStudentModal(id = null) {
  const s = id ? getStudent(id) : null;
  const m = document.createElement("div");
  m.className = "modal";
  m.innerHTML = `
    <div class="sheet">
      <h3>${s ? 'Edit Profile' : 'New Student'}</h3>
      <input id="fn" placeholder="First Name" value="${s ? s.firstName : ''}">
      <input id="ln" placeholder="Last Name" value="${s ? s.lastName : ''}">
      <input id="ph" placeholder="WhatsApp" value="${s ? s.phone : ''}">
      <select id="cefr">${['A1','A2','B1','B2','C1','C2'].map(l=>`<option value="${l}" ${s?.level===l?'selected':''}>${l}</option>`).join('')}</select>
      <label class="small">Hours Per Class</label>
      <input id="hpc" type="number" step="0.5" value="${s ? s.hoursPerClass : 1}">
      <label class="small">Lessons per Week</label>
      <select id="lpw">
        ${[1,2,3,4,5,6].map(num => `<option value="${num}" ${s?.lessonsPerWeek == num ? 'selected' : ''}>${num} Lesson${num > 1 ? 's' : ''} per Week</option>`).join('')}
      </select>
      <label class="small">Subscription $</label><input id="subPrice" type="number" value="${s ? s.subscriptionAmount : 210}">
      <p class="small" style="color:var(--gold); margin-top:15px;">* Due Date is now calculated automatically based on usage.</p>
      <button style="width:100%; margin-top:10px;" onclick="saveStudent(${id})">SAVE PROFILE</button>
      <button style="width:100%; margin-top:5px;" class="secondary" onclick="closeModal()">CANCEL</button>
    </div>`;
  document.body.appendChild(m);
}

function saveStudent(id) {
  const data = {
    firstName: document.getElementById('fn').value, lastName: document.getElementById('ln').value,
    phone: document.getElementById('ph').value, level: document.getElementById('cefr').value,
    hoursPerClass: parseFloat(document.getElementById('hpc').value),
    lessonsPerWeek: parseFloat(document.getElementById('lpw').value),
    subscriptionAmount: parseFloat(document.getElementById('subPrice').value)
  };
  if (id) { Object.assign(getStudent(id), data); } 
  else { const n = { id: Date.now(), ...data, ledger: [] }; students.push(n); selectedStudentId = n.id; }
  closeModal(); save();
}

function openPaymentModal(studentId, paymentId = null) {
  const s = getStudent(studentId);
  const p = paymentId ? s.ledger.find(e => e.id === paymentId) : null;
  const today = new Date().toISOString().split('T')[0];
  
  const m = document.createElement("div");
  m.className = "modal";
  m.innerHTML = `
    <div class="sheet">
      <h3>${p ? 'Edit' : 'Record'} Payment: ${s.firstName}</h3>
      <label class="small">Payment Date</label><input id="payDate" type="date" value="${p ? p.date : today}">
      <label class="small">Hours to Credit</label><input id="payHrs" type="number" step="0.5" value="${p ? p.hours : 16}">
      <label class="small">Amount Paid $</label><input id="payAmt" type="number" value="${p ? p.amount : s.subscriptionAmount}">
      <textarea id="payNotes" placeholder="Notes">${p ? p.notes : ''}</textarea>
      <button style="width:100%;" onclick="submitPayment(${studentId}, ${paymentId})">POST PAYMENT</button>
      <button style="width:100%; margin-top:5px;" class="secondary" onclick="closeModal()">CANCEL</button>
    </div>`;
  document.body.appendChild(m);
}

function submitPayment(studentId, paymentId) {
  const s = getStudent(studentId);
  const data = {
    date: document.getElementById('payDate').value, 
    type: "payment",
    hours: parseFloat(document.getElementById('payHrs').value),
    amount: parseFloat(document.getElementById('payAmt').value),
    notes: document.getElementById('payNotes').value
  };

  if (paymentId) {
    const p = s.ledger.find(e => e.id === paymentId);
    Object.assign(p, data);
  } else {
    s.ledger.push({ id: Date.now(), ...data });
  }
  closeModal(); save();
}

function setDay(studentId, date, type) {
  const s = getStudent(studentId);
  s.ledger = s.ledger.filter(e => e.date !== date || e.type === "payment");
  if (!type) return save();
  let hrs = (type === "attended" || type === "noshow") ? -s.hoursPerClass : (type === "double" ? -(s.hoursPerClass * 2) : 0);
  s.ledger.push({ id: Date.now(), date, type, hours: hrs });
  save();
}

function renderStudent(s) {
  const bal = balance(s);
  const isLow = bal <= 5;
  const dynamicDue = calculateDynamicDueDate(s);
  const messageText = `STUDENT UPDATE: ${s.firstName} ${s.lastName}\n` +
                      `Level: ${s.level}\n` +
                      `Hours Remaining: ${bal.toFixed(1)}\n` +
                      `Est. Exhaustion Date: ${dynamicDue}\n` +
                      `---------------------------\n` +
                      `Next Cycle: 16 Hours ($${s.subscriptionAmount})`;

  let html = `
  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 style="color:var(--gold); margin:0;">${s.firstName.toUpperCase()} ${s.lastName.toUpperCase()}</h2>
        <button class="secondary" onclick="openStudentModal(${s.id})">EDIT PROFILE</button>
    </div>
    
    <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:15px; margin: 20px 0;">
        <div class="${isLow ? 'low-balance' : ''}">
          <div class="small">Balance</div>
          <div style="font-size:22px;">${bal.toFixed(1)} hrs ${isLow ? '⚠️' : ''}</div>
        </div>
        <div><div class="small">Price</div><div>$${s.subscriptionAmount}</div></div>
        <div><div class="small">Due Date (Est.)</div><div style="color:var(--gold); font-weight:bold;">${dynamicDue}</div></div>
    </div>

    <div class="ledger-container">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h4 style="color:var(--gold);">TRANSACTIONS</h4>
        <button onclick="openPaymentModal(${s.id})">+ RECORD PAYMENT</button>
      </div>
      <div style="max-height: 150px; overflow-y: auto; border: 1px solid #333; border-radius: 4px;">
        <table>
          <thead><tr><th>Date</th><th>Hrs</th><th>Paid</th><th>Notes</th><th>Actions</th></tr></thead>
          <tbody>
            ${s.ledger.filter(e=>e.type==='payment').reverse().map(p => `
              <tr>
                <td>${p.date}</td><td>+${p.hours}</td><td>$${p.amount}</td><td>${p.notes||''}</td>
                <td style="display:flex; gap:8px;">
                  <button class="secondary" style="padding:4px 10px; font-size:11px;" onclick="openPaymentModal(${s.id}, ${p.id})">EDIT</button>
                  <button class="danger" style="padding:4px 10px; font-size:11px;" onclick="if(confirm('Delete Payment?')){getStudent(${s.id}).ledger=getStudent(${s.id}).ledger.filter(x=>x.id!==${p.id});save()}">DELETE</button>
                </td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <div class="calendar-header">
      <button class="secondary" onclick="viewMonth--;if(viewMonth<0){viewMonth=11;viewYear--};render()">◀</button>
      <strong>${new Date(viewYear, viewMonth).toLocaleString('default', { month: 'long', year: 'numeric' })}</strong>
      <button class="secondary" onclick="viewMonth++;if(viewMonth>11){viewMonth=0;viewYear++};render()">▶</button>
    </div>
    
    <div class="weekdays">
      <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
    </div>
    <div class="week">`;

  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const dInM = new Date(viewYear, viewMonth + 1, 0).getDate();
  
  for (let i = 0; i < firstDay; i++) {
    html += `<div class="day empty"></div>`;
  }

  for (let d = 1; d <= dInM; d++) {
    const dt = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const st = s.ledger.find(e => e.date === dt && e.type !== "payment")?.type || "";
    const cls = st === "" ? "none" : st;
    html += `<div class="day">${d}<select class="${cls}" onchange="setDay(${s.id},'${dt}',this.value)">
      <option value="" class="none">—</option>
      <option value="attended" class="attended" ${st==='attended'?'selected':''}>Attended</option>
      <option value="double" class="double" ${st==='double'?'selected':''}>Double</option>
      <option value="noshow" class="noshow" ${st==='noshow'?'selected':''}>No-show</option>
      <option value="vacation" class="vacation" ${st==='vacation'?'selected':''}>Vacation</option>
    </select></div>`;
  }
  
  html += `</div>
    <div style="margin-top:20px; background:#000; padding:15px; border-left:4px solid var(--wa);">
      <textarea id="waMsg${s.id}" style="width:100%; background:transparent; border:none; color:var(--wa); font-family:monospace; resize:none;" rows="6">${messageText}</textarea>
      <button class="wa" onclick="window.open('https://wa.me/${s.phone.replace(/\\D/g,'')}?text='+encodeURIComponent(document.getElementById('waMsg${s.id}').value))">SEND WHATSAPP</button>
    </div>

    <div style="margin-top:40px; border-top:1px solid #333; padding-top:20px;">
      <button class="danger" onclick="if(confirm('Delete Student?')){students=students.filter(x=>x.id!==${s.id});selectedStudentId=students[0]?.id||null;save()}">DELETE STUDENT PROFILE</button>
    </div>
  </div>`;
  return html;
}

function closeModal() { document.querySelector(".modal")?.remove(); }

function render() {
  document.getElementById("studentList").innerHTML = students.map(s => 
    `<button class="${selectedStudentId == s.id ? 'active' : ''}" onclick="selectedStudentId=${s.id};render()">${s.firstName}</button>`
  ).join("");
  const active = getStudent(selectedStudentId);
  document.getElementById("studentView").innerHTML = active ? renderStudent(active) : "";
}
render();
</script>
</body>
</html>
